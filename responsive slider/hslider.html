<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero slider</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="hero.css">
</head>
<body>
    <div id="carousel" class="carousel slide hero-slides" data-bs-ride="carousel">

        <ol class="carousel-indicators">
            <li class="active" data-bs-target="#carouselExample" data-bs-slide-to="0"></li>
            <li data-bs-target="#carousel" data-bs-slide-to="1"></li>
            <li data-bs-target="#carousel" data-bs-slide-to="2"></li>
        </ol>

        <div class="carousel-inner" role="listbox">

            <!-- Slide 1 -->
            <div class="carousel-item active boat">
                <div class="container h-100 d-md-block">
                    <div class="row align-items-center h-100">
                        <div class="col-12 col-md-9 col-lg-7 col-xl-6">

                            <div class="caption animate__animated animate__fadeIn">
                                <h2 class="animate__animated animate__fadeInLeft">
                                    Boat Excursions
                                </h2>

                                <p class="animate__animated animate__fadeInRight">
                                    Lorem ipsum dolor sit amet consectetur adipisicing elit.
                                </p>

                                <a class="animate__animated animate__fadeInUp btn btn-primary" href="#">
                                    Learn More
                                </a>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

            <!-- Slide 2 -->
            <div class="carousel-item sea">
                <div class="container h-100 d-md-block">
                    <div class="row align-items-center h-100">
                        <div class="col-12 col-md-9 col-lg-7 col-xl-6">

                            <div class="caption animate__animated animate__fadeIn">
                                <h2 class="animate__animated animate__fadeInLeft">
                                    Discover the Canyon by the Sea
                                </h2>

                                <p class="animate__animated animate__fadeInRight">
                                    Lorem ipsum dolor sit amet consectetur adipisicing elit.
                                </p>

                                <a class="animate__animated animate__fadeInUp btn btn-primary" href="#">
                                    Learn More
                                </a>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

            <!-- Slide 3 -->
            <div class="carousel-item river">
                <div class="container h-100 d-md-block">
                    <div class="row align-items-center h-100">
                        <div class="col-12 col-md-9 col-lg-7 col-xl-6">

                            <div class="caption animate__animated animate__fadeIn">
                                <h2 class="animate__animated animate__fadeInLeft">
                                    River Adventure
                                </h2>

                                <p class="animate__animated animate__fadeInRight">
                                    Lorem ipsum dolor sit amet consectetur adipisicing elit.
                                </p>

                                <a class="animate__animated animate__fadeInUp btn btn-primary" href="#">
                                    Learn More
                                </a>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>





    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"></script>
    
</body>
</html>
