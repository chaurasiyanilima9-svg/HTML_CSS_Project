<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tooltip icons section</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="tooltip.css">
</head>
<body>
    <div class="social_outer">
        <div class="social_inner">
            <div class="social_content">
                <i class="fa-brands fa-facebook social_icon"></i>
                <div class="social_tooltip social_tooltip-left">facebook</div>
            </div>

            <div class="social_content">
                <i class="fa-brands fa-square-instagram social_icon"></i>
                <div class="social_tooltip social_tooltip-top">Instagram</div>
            </div>

            <div class="social_content">
                <i class="fa-brands fa-twitter social_icon"></i>
                <div class="social_tooltip social_tooltip-bottom">Twitter</div>
            </div>

            <div class="social_content">
                <i class="fa-brands fa-youtube social_icon"></i>
                <div class="social_tooltip social_tooltip-top">Youtube</div>
            </div>

            <div class="social_content">
                <i class="fa-brands fa-telegram social_icon"></i>
                <div class="social_tooltip social_tooltip-right">Youtube</div>
            </div>

        </div>
    </div>
</body>
</html>
