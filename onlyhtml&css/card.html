<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive profile card UI Design using HTMLS\css</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="card.css">
</head>
<body>
    <input id="slider" class="customSlider" type="checkbox">
    <label for="slider"></label>
    <div class="wrapper">
        <div class="top-icon">
            <i class="fa-solid fa-left-long"></i>
            <i class="fa-solid fa-ellipsis"></i>
            <i class="fa-solid fa-heart"></i>
        </div>

        <div class="profile">
            <img src="Ellipse 1.png" alt="1.png" class="thumbnail">
            <div class="check"><i class="fa-solid fa-check"></i></div>
            <h3 class="name">Henna Roy</h3>
            <p class="title">front-end-developer</p>
            <p class="description">A front-end web developer is responsible for implementing visual element that users.</p>
            <button type="button" class="btn">Hire me</button>
        </div>

        <div class="social-icons">
            <div class="icon">
                <a href="/"><i class="fa-brands fa-instagram"></i></a>
                <h4>98.5k</h4>
                <p>followers</p>
            </div>

            <div class="icon">
                <a href="#"><i class="fa-brands fa-facebook"></i></a>
                <h4>44.5k</h4>
                <p>followers</p>
            </div>

            <div class="icon">
                <a href="#"><i class="fa-brands fa-youtube"></i></a>
                <h4>100k</h4>
                <p>followers</p>
            </div>

        </div>
    </div>
</body>
</html>
